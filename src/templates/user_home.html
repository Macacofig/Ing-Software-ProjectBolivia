<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMSA</title>

    <link rel="stylesheet" href="../styles/user_home.css">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <!-- HEADER -->
    <header class="main-header">
        <h1 class="titulo">EMSA</h1>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">

        <!-- FILTROS -->
        <section class="filters">
            <form class="filter-bar">

                <!-- DISTRITO -->
                <label>
                    <span>Distrito</span>
                    <select id="filter-distrito">
                        <option value="">Seleccionar</option>
                        <option value="2">Distrito 2</option>
                        <option value="6">Distrito 6</option>
                        <option value="7">Distrito 7</option>
                        <option value="8">Distrito 8</option>
                        <option value="9">Distrito 9</option>
                        <option value="15">Distrito 15</option>
                    </select>
                </label>

                <!-- ZONA (DINÁMICA) -->
                <label>
                    <span>Zona</span>
                    <select id="filter-zona">
                        <option value="">Seleccionar</option>
                    </select>
                </label>

                <!-- DÍA -->
                <label>
                    <span>Día</span>
                    <select id="filter-dia">
                        <option value="">Seleccionar</option>
                        <option value="lunes">Lunes</option>
                        <option value="martes">Martes</option>
                        <option value="miercoles">Miércoles</option>
                        <option value="jueves">Jueves</option>
                        <option value="viernes">Viernes</option>
                        <option value="sabado">Sábado</option>
                        <option value="domingo">Domingo</option>
                    </select>
                </label>

                <button type="button" class="search-btn">
                    <i class="fas fa-search"></i>
                </button>

            </form>
        </section>
        
        <script src="../functions/EMSA/user.js"></script>
        <!-- RESULTADOS -->
        <section class="results">
            <h2 class="subtitulo">Dias de Servicio</h2>

            <div id="grid-cards" class="grid-cards">
                <!-- Cards vacías por ahora -->
                <article class="card">
                    <p><strong>Distrito:</strong></p>
                    <p><strong>Zona:</strong></p>
                    <p><strong>Día:</strong></p>
                    <p><strong>Hora:</strong></p>
                </article>
            </div>
        </section>

    </main>
</body>
</html>
